<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>
  <!-- Center circle background -->
  <circle cx="400" cy="200" r="72" fill="#222244" opacity="0.8"/>
  <circle cx="400" cy="200" r="72" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.3"/>
  <!-- Globe icon lines (simplified) -->
  <circle cx="400" cy="200" r="38" fill="none" stroke="#6c5ce7" stroke-width="2" opacity="0.6"/>
  <ellipse cx="400" cy="200" rx="20" ry="38" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.4"/>
  <line x1="362" y1="200" x2="438" y2="200" stroke="#6c5ce7" stroke-width="1.5" opacity="0.4"/>
  <line x1="364" y1="185" x2="436" y2="185" stroke="#6c5ce7" stroke-width="1" opacity="0.3"/>
  <line x1="364" y1="215" x2="436" y2="215" stroke="#6c5ce7" stroke-width="1" opacity="0.3"/>
  <!-- Text -->
  <text x="400" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6c5ce7" text-anchor="middle" letter-spacing="3" opacity="0.8">GLOBAL CONNECT</text>
  <text x="400" y="326" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8888aa" text-anchor="middle" letter-spacing="0.5">Establecimiento sin imagen</text>
</svg>

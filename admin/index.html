<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Panel Admin — Global Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="admin-layout">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <div class="topbar-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <span class="topbar-logo-text">Global Connect</span>
      </div>
      <div class="topbar-sep"></div>
      <span class="topbar-subtitle">Panel Admin</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="topbar-admin-name">●</span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Gestión</div>
    <div class="sidebar-link active" data-nav="dashboard">
      <span class="sidebar-icon">📊</span> Dashboard
    </div>
    <div class="sidebar-link" data-nav="locales">
      <span class="sidebar-icon">🏢</span> Partners
    </div>
    <div class="sidebar-link" data-nav="agregar">
      <span class="sidebar-icon">➕</span> Nuevo local
    </div>
    <div class="sidebar-link" data-nav="eventos">
      <span class="sidebar-icon">📅</span> Eventos
    </div>
    <div class="sidebar-link" data-nav="planes">
      <span class="sidebar-icon">⚙️</span> Planes & MRR
    </div>
    <div class="sidebar-link" data-nav="estudiantes">
      <span class="sidebar-icon">👥</span> Estudiantes
    </div>
    <div class="sidebar-label" style="margin-top:16px">Configuración</div>
    <div class="sidebar-link" data-nav="dominios">
      <span class="sidebar-icon">🎓</span> Dominios
    </div>
    <div class="sidebar-logout" id="sidebar-logout">
      <span class="sidebar-icon">↩</span> Cerrar sesión
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="admin-content"></main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script src="admin.js"></script>
</body>
</html>

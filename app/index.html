        <div class="app-user">
          <div class="app-avatar">L</div>
          <span class="app-user-name">Lauti</span>
        </div>
      </div>
    </div>

    <!-- SCROLLABLE CONTENT (rendered by JS) -->
    <div class="content" id="app-content"></div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav" id="bottom-nav">
      <div class="nav-item" data-view="feed">

        <span class="nav-item-label">Inicio</span>

      <div class="nav-item" data-view="eventos">

        <span class="nav-item-label">Mi Pass</span>
